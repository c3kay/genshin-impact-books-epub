name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Lint Markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: books

  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      collections: ${{ steps.collections.outputs.collections }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Define collection order
        id: collections
        shell: bash
        run: |
          collections=$(jq -R -s -c 'split("\n")[:-1]' books/collections.txt)
          echo "collections=$collections" >> "$GITHUB_OUTPUT"

  build-region:
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - lint
    strategy:
      matrix:
        collection: ${{ fromJSON(needs.prepare-matrix.outputs.collections) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check metadata file
        run: |
          if [ ! -f "books/${{ matrix.collection }}/metadata.yaml" ]; then
              echo "Error: 'metadata.yaml' is missing!"
              exit 1
          fi
          echo "Found 'metadata.yaml' file!"
      - name: Create file list
        # wildcard * is not expanded in workflow cmd
        id: region-books
        shell: bash
        run: >-
          echo
          "files=$(printf '"%s" ' books/${{ matrix.collection }}/*)"
          >> $GITHUB_OUTPUT
      - name: Build EPUB with pandoc
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            -o genshin-books-${{ matrix.collection }}-${{ github.ref_name }}.epub
            books/foreword-region.md
            ${{ steps.region-books.outputs.files }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.collection }}
          path: '*.epub'
          if-no-files-found: error
    
  build-combined:
    runs-on: ubuntu-latest
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check metadata file
        run: |
          if [ ! -f "books/metadata.yaml" ]; then
              echo "Error: 'metadata.yaml' is missing!"
              exit 1
          fi
          echo "Found 'metadata.yaml' file!"
      - name: Create file list
        id: all-books
        shell: bash
        run: |
          files=()
          while read -r collection; do
            [[ -z "$collection" ]] && continue
            for file in "books/$collection"/*.md; do
              [[ -f "$file" ]] && files+=("$file")
            done
          done < books/collections.txt
          echo "files=${files[*]}" >> "$GITHUB_OUTPUT"
      - name: Build EPUB with pandoc
        uses: docker://pandoc/core:3.1
        with:
          args: >-
            -o genshin-books-combined-${{ github.ref_name }}.epub
            books/metadata.yaml
            books/foreword-combined.md
            ${{ steps.all-books.outputs.files }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: combined
          path: '*.epub'
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags')
    needs:
      - build-region
      - build-combined
    steps:
      - name: Checkout changes file
        uses: actions/checkout@v6
        with:
          sparse-checkout: CHANGES.md
          sparse-checkout-cone-mode: false
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: epub
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: epub/**/*.epub
          body_path: CHANGES.md
          fail_on_unmatched_files: true
